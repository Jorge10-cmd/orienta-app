name: Build APK con Capacitor
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar Dependencias y Generar App
        run: |
          mkdir www
          cp index.html www/
          npm init -y
          npm install @capacitor/core @capacitor/cli
          npx cap init OrientaApp com.upvm.orienta --web-dir=www
          npm install @capacitor/android
          npx cap add android
          npx cap sync
          
      - name: Compilar APK (Gradle)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Subir APK Terminado
        uses: actions/upload-artifact@v3
        with:
          name: App-Capacitor-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
